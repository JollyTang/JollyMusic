name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build H5
        working-directory: app
        run: npm run build:h5

      - name: Package H5 bundle for OTA
        run: |
          cd app/dist/build/h5
          zip -r -q ../../../../h5-bundle.zip .

      - name: Sync Capacitor
        working-directory: app
        run: npx cap sync android

      - name: Build APK
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/android/app/build/outputs/apk/debug/app-debug.apk ListenMusic.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ListenMusic-debug
          path: ListenMusic.apk
          retention-days: 30

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app/package.json').version")
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=web-${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create OTA Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            自动构建 #${{ github.run_number }}

            **APK**: 首次安装或原生更新时下载 `ListenMusic.apk`
            **OTA**: 已安装用户无需操作，App 启动时自动更新前端
          files: |
            ListenMusic.apk
            h5-bundle.zip
          make_latest: true
